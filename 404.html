<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Page Moved</title>
    <style>
      body { font-family: sans-serif; text-align: center; padding: 50px; }
      .loader { color: #666; }
    </style>
  </head>
  <body>
    <h1>Looking for something?</h1>
    <p>This site has moved to a new home.</p>
    <p class="loader">Redirecting you to the new version of this page...</p>

    <script>
      // The new base URL of your website
      const newDomain = "https://llaneve.net";

      // Take the current path (e.g., /blog/old-post) 
      // and append it to the new domain
      const currentPath = window.location.pathname;
      const targetUrl = newDomain + currentPath;

      // Redirect after a brief delay (or set to 0 for instant)
      window.location.href = targetUrl;
    </script>
    
    <p>If you aren't redirected, <a id="manual-link" href="#">click here</a>.</p>
    <script>
      document.getElementById('manual-link').href = newDomain + window.location.pathname;
    </script>
  </body>
</html>
